kind = "web"
previewPath = "/"
title = "SoundMap"
version = "1.0.0"
id = "artifacts/soundmap"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19912

[services.development]
run = "pnpm --filter @workspace/soundmap run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/soundmap", "run", "build" ]
publicDir = "artifacts/soundmap/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19912"
BASE_PATH = "/"
